<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Đuka - Gestão de Imóveis</title>
	<link rel="icon" href="/app/favicon.ico" type="image/x-icon">
	<link rel="stylesheet" href="/app/style-responsive.css?v=20260220_RESPONSIVE_TABLES">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<style>
		/* Estilos específicos para login */
		body {
			margin: 0;
			padding: 0;
			background: #f5f5f5;
		}
	</style>
</head>
<body>
	<!-- Login Section ONLY -->
	<div id="login-section" class="auth-section active">
		<div class="auth-container">
			<div class="auth-card">
				<h1><a href="/" style="color:inherit;text-decoration:none;">Đuka</a></h1>
				<p class="subtitle">Plataforma SaaS de Gestão de Imóveis</p>
                
				<form id="login-form">
					<div class="form-group">
						<label for="login-email">E-mail</label>
						<input type="email" id="login-email" placeholder="seu@email.com" required>
					</div>
					<div class="form-group">
						<label for="login-password">Senha</label>
						<input type="password" id="login-password" placeholder="Sua senha" required>
					</div>
					<button type="submit" class="btn btn-primary btn-full">Entrar</button>
					<div id="login-error" class="error-message"></div>
				</form>
                
				<p class="auth-link" style="text-align: center; margin-top: 15px; color: #999; font-size: 13px;">
					Plataforma de gerenciamento de propriedades
				</p>
				<div style="text-align: center; color: var(--primary-color); font-size: 12.5px; margin-top: 8px; letter-spacing: 0.5px; font-weight: 600;">
					CODE85
				</div>
			</div>
		</div>
	</div>

	<!-- Login Script ONLY -->
	<script>
		const API_BASE = '/api';

		document.getElementById('login-form')?.addEventListener('submit', async (e) => {
			e.preventDefault();
			const email = document.getElementById('login-email').value;
			const password = document.getElementById('login-password').value;

			try {
				console.log(`[LOGIN] Enviando credenciais para: ${email}`);
				
				const res = await fetch(`${API_BASE}/auth/login`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ email, password })
				});

				console.log(`[LOGIN] Response status: ${res.status}`);
				let data;
				try {
					data = await res.json();
				} catch (parseErr) {
					console.error(`[LOGIN] Erro ao fazer parse JSON:`, parseErr);
					const errorDiv = document.getElementById('login-error');
					errorDiv.textContent = 'Erro ao processar resposta do servidor';
					errorDiv.style.display = 'block';
					return;
				}
				
				console.log(`[LOGIN] Response data:`, data);
				
				if (!res.ok) {
					const errorMsg = data.error || `Erro ${res.status}: ${res.statusText}`;
					console.error(`[LOGIN] Erro na resposta:`, errorMsg);
					const errorDiv = document.getElementById('login-error');
					errorDiv.textContent = errorMsg;
					errorDiv.style.display = 'block';
					alert(`Erro ao fazer login: ${errorMsg}`);
					return;
				}

				if (!data.token || !data.user) {
					console.error(`[LOGIN] Resposta incompleta:`, data);
					const errorDiv = document.getElementById('login-error');
					errorDiv.textContent = 'Resposta incompleta do servidor';
					errorDiv.style.display = 'block';
					alert('Erro: Resposta incompleta do servidor');
					return;
				}

				console.log(`[LOGIN] Autenticação bem-sucedida para user_id: ${data.user.id}`);
				
				localStorage.setItem('token', data.token);
				localStorage.setItem('currentUser', JSON.stringify(data.user));
				
				console.log(`[LOGIN] LocalStorage atualizado`);
				console.log(`[LOGIN] Redirecionando para /app`);
				
				// ✅ Redirecionar para SPA após login bem-sucedido
				window.location.href = '/app';

			} catch (error) {
				console.error(`[LOGIN] Erro não capturado:`, error);
				const errorDiv = document.getElementById('login-error');
				errorDiv.textContent = `Erro: ${error.message}`;
				errorDiv.style.display = 'block';
			}
		});
	</script>
</body>
</html>
